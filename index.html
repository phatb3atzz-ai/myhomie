<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Radar Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 20px;
        }
        .header {
            max-width: 1000px;
            margin: 0 auto 20px auto;
        }
        h1 {
            color: #f0f6fc;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #8b949e;
            font-size: 0.95rem;
            margin-top: 0;
        }
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto 20px auto;
        }
        .stat-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px 20px;
        }
        .stat-label {
            color: #8b949e;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            color: #f0f6fc;
            font-size: 2rem;
            font-weight: 600;
            margin-top: 5px;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .video-panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        .video-stream {
            width: 100%;
            height: auto;
            display: block;
        }
        .log-panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        .log-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #f0f6fc;
            border-bottom: 1px solid #30363d;
            padding-bottom: 8px;
        }
        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #21262d;
        }
        .log-left {
            display: flex;
            flex-direction: column;
        }
        .log-time {
            font-size: 0.75rem;
            color: #8b949e;
        }
        .log-plate {
            font-weight: bold;
            color: #58a6ff;
            margin-top: 3px;
        }
        .log-speed {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ff7b72;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Speed Radar Live Dashboard</h1>
        <p class="subtitle">Real-time trip-wire computer vision engine tracking speeds and plates locally.</p>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-label">Vehicles Tracked</div>
            <div id="stat-tracked" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Over Limit</div>
            <div id="stat-over" class="stat-value" style="color: #ff7b72;">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Avg Speed</div>
            <div id="stat-avg" class="stat-value">0 km/h</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="video-panel">
            <img class="video-stream" src="/video_feed" alt="Live Radar Feed">
        </div>

        <div class="log-panel">
            <div class="log-header">Recent Detections</div>
            <div id="log-list"></div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                document.getElementById('stat-tracked').innerText = data.total_tracked;
                document.getElementById('stat-over').innerText = data.over_limit;
                document.getElementById('stat-avg').innerText = data.avg_speed + " km/h";

                const logList = document.getElementById('log-list');
                logList.innerHTML = '';

                if (data.recent.length === 0) {
                    logList.innerHTML = '<div style="color: #8b949e; font-size: 0.9rem;">No detections yet...</div>';
                    return;
                }

                data.recent.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'log-item';
                    div.innerHTML = `
                        <div class="log-left">
                            <span class="log-time">${item.time}</span>
                            <span class="log-plate">Plate: ${item.plate}</span>
                        </div>
                        <div class="log-speed">${item.speed}</div>
                    `;
                    logList.appendChild(div);
                });
            } catch (err) {
                console.error("Error updating dashboard:", err);
            }
        }

        setInterval(updateDashboard, 1000);
        updateDashboard();
    </script>
</body>
</html>
