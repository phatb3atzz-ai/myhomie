<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyHomie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0f14;font-family:sans-serif;height:100vh;overflow:hidden;color:#e0e6ed;}
#login{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;padding:30px;}
.ltitle{font-size:28px;font-weight:700;color:#fff;}
.lsub{font-size:14px;color:#6b7a8d;}
.inp{width:100%;max-width:320px;background:#131c26;border:1px solid #1e2d3d;border-radius:12px;padding:14px 18px;font-size:16px;color:#e0e6ed;outline:none;}
.inp:focus{border-color:#1fb8a0;}
.btn{width:100%;max-width:320px;background:transparent;border:1.5px solid #1fb8a0;border-radius:12px;padding:14px;font-size:16px;color:#1fb8a0;cursor:pointer;}
.err{color:#e05555;font-size:13px;display:none;}
#app{display:none;flex-direction:column;height:100vh;}
.sb{display:flex;justify-content:space-between;padding:10px 20px 4px;}
.sb span{font-size:12px;color:#6b7a8d;}
.screen{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;display:flex;flex-direction:column;background:#0a0f14;transition:transform 0.25s;overflow:hidden;}
.page.off{transform:translateX(100%);}
.tb{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;}
.tbtitle{font-size:22px;font-weight:700;color:#fff;}
.ci{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;}
.av{width:50px;height:50px;border-radius:50%;background:#131c26;border:1.5px solid #1fb8a0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#1fb8a0;flex-shrink:0;}
.cn{font-size:16px;font-weight:600;color:#e0e6ed;}
.cp{font-size:13px;color:#6b7a8d;margin-top:3px;}
.div{height:0.5px;background:#1e2d3d;margin:0 20px;}
.ctb{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid #1e2d3d;}
.bk{font-size:22px;color:#1fb8a0;cursor:pointer;font-weight:300;}
.cav{width:38px;height:38px;border-radius:50%;background:#131c26;border:1.5px solid #1fb8a0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1fb8a0;flex-shrink:0;}
.cti{flex:1;}
.ctn{font-size:15px;font-weight:600;color:#e0e6ed;}
.cts{font-size:11px;color:#1fb8a0;}
.msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.msg{max-width:78%;display:flex;flex-direction:column;gap:3px;}
.msg.me{align-self:flex-end;align-items:flex-end;}
.msg.them{align-self:flex-start;align-items:flex-start;}
.bbl{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;}
.me .bbl{background:#1fb8a020;border:1px solid #1fb8a050;color:#e0e6ed;border-bottom-right-radius:4px;}
.them .bbl{background:#131c26;border:1px solid #1e2d3d;color:#e0e6ed;border-bottom-left-radius:4px;}
.mt{font-size:10px;color:#6b7a8d;}
.ibar{display:flex;align-items:center;gap:10px;padding:10px 16px 20px;border-top:0.5px solid #1e2d3d;}
.minp{flex:1;background:#131c26;border:1px solid #1e2d3d;border-radius:22px;padding:10px 16px;font-size:14px;color:#e0e6ed;outline:none;}
.minp:focus{border-color:#1fb8a0;}
.minp::placeholder{color:#6b7a8d;}
.sbtn{width:40px;height:40px;border-radius:50%;background:#1fb8a0;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-size:18px;}
.nav{display:flex;background:#0a0f14;border-top:0.5px solid #1e2d3d;padding:8px 0 18px;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-size:10px;color:#6b7a8d;}
.ni.on{color:#1fb8a0;}
.nb{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#131c26;border:1px solid #1fb8a0;border-radius:12px;padding:12px 20px;font-size:14px;color:#e0e6ed;z-index:999;display:none;max-width:300px;text-align:center;}
</style>
</head>
<body>
<div class="nb" id="nb"></div>
<div id="login">
  <div class="ltitle">MyHomie</div>
  <div class="lsub">Enter your name and password</div>
  <input class="inp" id="ni" placeholder="Your name" maxlength="20"/>
  <input class="inp" id="pi" type="password" placeholder="Password"/>
  <div class="err" id="er">Wrong password</div>
  <button class="btn" onclick="doLogin()">Let's go</button>
</div>
<div id="app">
  <div class="sb">
    <span id="sn">MyHomie</span>
    <span id="st">--:--</span>
  </div>
  <div class="screen">
    <div class="page" id="p1">
      <div class="tb"><span class="tbtitle">Chats</span></div>
      <div class="div"></div>
      <div id="cl"></div>
    </div>
    <div class="page off" id="p2">
      <div class="ctb">
        <span class="bk" onclick="goBack()">&#8592;</span>
        <div class="cav" id="cav">?</div>
        <div class="cti">
          <div class="ctn" id="ctn">...</div>
          <div class="cts">online</div>
        </div>
      </div>
      <div class="msgs" id="msgs"></div>
      <div class="ibar">
        <input class="minp" id="mi" placeholder="Message..." onkeydown="if(event.key==='Enter')doSend()"/>
        <button class="sbtn" onclick="doSend()">&#10148;</button>
      </div>
    </div>
  </div>
  <div class="nav">
    <div class="ni on">&#128172; Chats</div>
    <div class="ni">&#128100; Contacts</div>
    <div class="ni">&#9881; Settings</div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg = {
  apiKey:"AIzaSyCmlU9wGKlmOkAnzjFt0-ng1vlQlACr9Ik",
  authDomain:"buddy-chat-a7aae.firebaseapp.com",
  databaseURL:"https://buddy-chat-a7aae-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"buddy-chat-a7aae",
  storageBucket:"buddy-chat-a7aae.firebasestorage.app",
  messagingSenderId:"806705827259",
  appId:"1:806705827259:web:a71e9754feaf5751fbc89e"
};
const app = initializeApp(cfg);
const db = getDatabase(app);
const PASS = "homie2024";
let me = "", chat = "", unsub = null;
const saved = localStorage.getItem("mhn");
if(saved){ me=saved; start(); } else { document.getElementById("login").style.display="flex"; }
window.doLogin = function(){
  const n=document.getElementById("ni").value.trim();
  const p=document.getElementById("pi").value.trim();
  if(!n) return;
  if(p!==PASS){ document.getElementById("er").style.display="block"; return; }
  me=n; localStorage.setItem("mhn",me);
  document.getElementById("login").style.display="none";
  start();
};
function start(){
  document.getElementById("sn").textContent=me;
  document.getElementById("app").style.display="flex";
  set(ref(db,"users/"+me),{online:true});
  if("Notification" in window) Notification.requestPermission();
  loadUsers();
  setInterval(()=>{
    const d=new Date();
    document.getElementById("st").textContent=d.getHours()+":"+(d.getMinutes()<10?"0":"")+d.getMinutes();
  },1000);
}
function ini(n){ return n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2); }
function cid(a,b){ return [a,b].sort().join("_"); }
function ft(ts){ const d=new Date(ts); return d.getHours()+":"+(d.getMinutes()<10?"0":"")+d.getMinutes(); }
function notify(from,text){
  const nb=document.getElementById("nb");
  nb.textContent=from+": "+text;
  nb.style.display="block";
  setTimeout(()=>nb.style.display="none",4000);
  try{ const a=new Audio("https://cdn.freesound.org/previews/415/415510_5121236-lq.mp3"); a.volume=0.5; a.play(); }catch(e){}
  if(Notification.permission==="granted") new Notification("MyHomie - "+from,{body:text});
}
function loadUsers(){
  onValue(ref(db,"users"),snap=>{
    const data=snap.val()||{};
    const cl=document.getElementById("cl");
    cl.innerHTML="";
    Object.keys(data).forEach(name=>{
      if(name===me) return;
      const d=document.createElement("div");
      d.className="ci";
      d.innerHTML='<div class="av">'+ini(name)+'</div><div><div class="cn">'+name+'</div><div class="cp">Tap to chat</div></div>';
      d.onclick=()=>openChat(name);
      cl.appendChild(d);
      cl.appendChild(Object.assign(document.createElement("div"),{className:"div"}));
      watchMsgs(name);
    });
  });
}
const watched={};
function watchMsgs(name){
  if(watched[name]) return;
  watched[name]=true;
  let init=false, count=0;
  onValue(ref(db,"chats/"+cid(me,name)),snap=>{
    const vals=Object.values(snap.val()||{});
    if(!init){ init=true; count=vals.length; return; }
    if(vals.length>count){
      const last=vals[vals.length-1];
      if(last.sender!==me && chat!==name) notify(name,last.text);
      count=vals.length;
    }
  });
}
window.openChat=function(name){
  chat=name;
  document.getElementById("cav").textContent=ini(name);
  document.getElementById("ctn").textContent=name;
  document.getElementById("p2").classList.remove("off");
  const msgs=document.getElementById("msgs");
  msgs.innerHTML="";
  if(unsub) unsub();
  unsub=onValue(ref(db,"chats/"+cid(me,name)),snap=>{
    msgs.innerHTML="";
    Object.values(snap.val()||{}).forEach(msg=>{
      const d=document.createElement("div");
      d.className="msg "+(msg.sender===me?"me":"them");
      d.innerHTML='<div class="bbl">'+msg.text+'</div><span class="mt">'+ft(msg.ts)+'</span>';
      msgs.appendChild(d);
    });
    msgs.scrollTop=msgs.scrollHeight;
  });
};
window.goBack=function(){
  document.getElementById("p2").classList.add("off");
  chat="";
  if(unsub){ unsub(); unsub=null; }
};
window.doSend=function(){
  const inp=document.getElementById("mi");
  const text=inp.value.trim();
  if(!text||!chat) return;
  push(ref(db,"chats/"+cid(me,chat)),{sender:me,text:text,ts:Date.now()});
  inp.value="";
};
</script>
</body>
</html>
